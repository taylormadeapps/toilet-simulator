name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get install -y xvfb libsdl2-dev

      - name: Install Python dependencies
        run: pip install pygame-ce pygbag

      - name: Copy assets into src for bundling
        run: cp -r assets src/assets

      - name: Build web version
        run: xvfb-run -a python -u -m pygbag --build --disable-sound-format-error --app_name "Toilet Simulator" src/main.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: src/build/web
